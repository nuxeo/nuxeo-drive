name: Dead code
permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    paths:
      - "**/*.py"

jobs:
  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.COPILOT_CLI_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13 # XXX_PYTHON
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('tools/deps/requirements-tests.txt', 'tools/deps/requirements-tox.txt') }}
          restore-keys: ${{ runner.os }}-pip-${{ hashFiles('tools/deps/requirements-tests.txt', 'tools/deps/requirements-tox.txt') }}
      - uses: actions/cache@v5
        with:
          path: .tox
          key: ${{ runner.os }}-tox-${{ hashFiles('tools/deps/requirements-tests.txt', 'tools/deps/requirements-tox.txt') }}
          restore-keys: ${{ runner.os }}-tox-${{ hashFiles('tools/deps/requirements-tests.txt', 'tools/deps/requirements-tox.txt') }}
      - name: Install dependencies
        run: python -m pip install -r tools/deps/requirements-tox.txt
      - name: Setup Node.js
        uses: actions/setup-node@v4
      - name: Install Copilot CLI
        run: npm install -g @github/copilot
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Run Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
            copilot -p "Fix dead code issues. Remove unused variables and imports. Ignore #noqa. Export all changes done to summary.md" --allow-tool='shell(git:*)' --allow-tool=write --no-ask-user --model=gpt-5-mini
            cat summary.md >> $GITHUB_STEP_SUMMARY
      - name: Commit and push changes
        run: |
          git add .
          git commit -m "style: auto-fix dead code" || echo "No changes to commit"
          git push
      - name: Export Summary File
        uses: actions/upload-artifact@v7
        with:
          name: summary.md
          path: ./summary.md
          if-no-files-found: error
      - name: Dead code check
        run: tox -e cleanup
